name: trainflow

services:
  exercise-service:
    build: ./services/exercise-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production-please-32b}
      DATABASE_URL: sqlite:////data/trainflow.db
    volumes:
      - trainflow-db:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 3s
      retries: 10

  coach-service:
    build: ./services/coach-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production-please-32b}
      EXERCISE_API_URL: http://exercise-service:8000
      REDIS_URL: redis://redis:6379
      # LLM provider: auto | anthropic | ollama | fallback.
      # "auto" uses Anthropic when ANTHROPIC_API_KEY is set, else the fallback.
      # Set COACH_PROVIDER=ollama for a free, fully-local model (start the
      # "ollama" profile below and pull a model first).
      COACH_PROVIDER: ${COACH_PROVIDER:-auto}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      COACH_MODEL: ${COACH_MODEL:-claude-opus-4-8}
      COACH_USE_LLM: ${COACH_USE_LLM:-true}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
    ports:
      - "8001:8001"
    depends_on:
      exercise-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Opt-in free, local LLM. Start with:  docker compose --profile ollama up -d
  # then pull a model once:  docker compose exec ollama ollama pull llama3.1
  # and set COACH_PROVIDER=ollama in .env.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  interface:
    build: ./interface
    environment:
      TRAINFLOW_API_URL: http://exercise-service:8000
      TRAINFLOW_COACH_URL: http://coach-service:8001
    ports:
      - "8501:8501"
    depends_on:
      - exercise-service
      - coach-service

  # Opt-in async worker. Start with:  docker compose --profile worker up
  refresh-worker:
    build: ./scripts
    profiles: ["worker"]
    environment:
      REDIS_URL: redis://redis:6379
      EXERCISE_API_URL: http://exercise-service:8000
    depends_on:
      redis:
        condition: service_healthy
      exercise-service:
        condition: service_healthy

volumes:
  trainflow-db:
  ollama-models:
